name: Build iOS App

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/apps/rn/**'
  pull_request:
    branches: [main]
    paths:
      - 'packages/apps/rn/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/apps/rn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/apps/rn/package-lock.json

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS App
        run: eas build --platform ios --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive

      - name: Download build artifacts
        if: github.event.inputs.profile == 'preview' || github.event.inputs.profile == 'production'
        run: |
          # Get the build URL from EAS
          BUILD_URL=$(eas build:list --platform ios --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          if [ -n "$BUILD_URL" ]; then
            curl -L -o ios-build.ipa "$BUILD_URL"
          fi

      - name: Upload IPA artifact
        if: github.event.inputs.profile == 'preview' || github.event.inputs.profile == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: packages/apps/rn/ios-build.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event.inputs.profile == 'production'
        run: |
          echo "Uploading to TestFlight..."
          # This would require additional setup with Apple credentials
          # eas submit --platform ios --path ios-build.ipa

  build-ios-local:
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: packages/apps/rn

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/apps/rn/package-lock.json

      - name: Setup PNPM
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: pnpm run lint

      - name: Run tests
        run: pnpm test -- --passWithNoTests
